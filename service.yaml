apiVersion: v1
kind: Service
metadata:
  name: web-server-service
  namespace: default
  labels:
    app: web-server
    tier: frontend
spec:
  # NodePort makes the service accessible outside the cluster via the Minikube IP
  type: NodePort
  selector:
    app: web-server
  ports:
  - port: 80         # Port exposed on the cluster's internal network
    targetPort: 80   # Port the application container is listening on (Nginx)
    nodePort: 32000  # Explicitly bind to port 32000 (valid range: 30000-32767)
    protocol: TCP
